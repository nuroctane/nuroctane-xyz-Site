kind = "web"
previewPath = "/"
title = "Digital Sea — nur"
version = "1.0.0"
id = "artifacts/digital-sea"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26225

[services.development]
run = "pnpm --filter @workspace/digital-sea run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-sea", "run", "build" ]
publicDir = "artifacts/digital-sea/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26225"
BASE_PATH = "/"
